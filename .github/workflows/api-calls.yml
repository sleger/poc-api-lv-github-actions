name: 🚀 POC - Appels API Automatiques

on:
  push:
    branches:
      - main

jobs:
  api-success:
    name: ✅ Appels API - SUCCESS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v5

      - name: 🟢 Installation de Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 🚀 Lancement des appels API Success
        id: run
        run: |
          node api-calls.js 2>&1 | tee /tmp/success_output.txt || true
          ENCODED=$(base64 -w 0 /tmp/success_output.txt)
          echo details=$ENCODED >> $GITHUB_OUTPUT

      - name: 🔍 Debug output SUCCESS
        run: |
          echo === DEBUG GITHUB_OUTPUT ===
          cat $GITHUB_OUTPUT
          echo === DEBUG FILE ===
          cat /tmp/success_output.txt

  api-failure:
    name: ❌ Appels API - FAILURE
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v5

      - name: 🟢 Installation de Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 💥 Lancement des appels API Failure
        id: run
        run: |
          node api-calls-failure.js 2>&1 | tee /tmp/failure_output.txt || true
          ENCODED=$(base64 -w 0 /tmp/failure_output.txt)
          echo details=$ENCODED >> $GITHUB_OUTPUT

      - name: 🔍 Debug output FAILURE
        run: |
          echo === DEBUG GITHUB_OUTPUT ===
          cat $GITHUB_OUTPUT
          echo === DEBUG FILE ===
          cat /tmp/failure_output.txt

  send-report:
    name: 📧 Envoi du rapport email
    runs-on: ubuntu-latest
    needs: [api-success, api-failure]
    if: always()

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v5

      - name: 🟢 Installation de Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 📧 Envoi du rapport
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          WORKFLOW_STATUS: ${{ needs.api-success.result }}
          SUCCESS_DETAILS: ${{ needs.api-success.outputs.details }}
          FAILURE_DETAILS: ${{ needs.api-failure.outputs.details }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo === DEBUG SUCCESS_DETAILS ===
          echo $SUCCESS_DETAILS | base64 -d
          echo === DEBUG FAILURE_DETAILS ===
          echo $FAILURE_DETAILS | base64 -d
          node send-report.js
