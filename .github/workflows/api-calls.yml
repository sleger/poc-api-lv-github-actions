name: 🚀 POC - Appels API Automatiques

on:
  push:
    branches:
      - main

jobs:
  api-success:
    name: ✅ Appels API - SUCCESS
    runs-on: ubuntu-latest
    outputs:
      details: ${{ steps.run.outputs.details }}

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v5

      - name: 🟢 Installation de Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 🚀 Lancement des appels API Success
        id: run
        run: |
          OUTPUT=$(node api-calls.js 2>&1)
          echo "$OUTPUT"
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  api-failure:
    name: ❌ Appels API - FAILURE
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      details: ${{ steps.run.outputs.details }}

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v5

      - name: 🟢 Installation de Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 💥 Lancement des appels API Failure
        id: run
        run: |
          OUTPUT=$(node api-calls-failure.js 2>&1)
          echo "$OUTPUT"
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  send-report:
    name: 📧 Envoi du rapport email
    runs-on: ubuntu-latest
    needs: [api-success, api-failure]
    if: always()

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v5

      - name: 🟢 Installation de Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 📧 Envoi du rapport
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          WORKFLOW_STATUS: ${{ needs.api-success.result }}
          SUCCESS_DETAILS: ${{ needs.api-success.outputs.details }}
          FAILURE_DETAILS: ${{ needs.api-failure.outputs.details }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node send-report.js
